<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FX Dashboard">
<meta name="theme-color" content="#0a0e1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>FX Weekly Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0e1a;
  --bg2:      #111827;
  --bg3:      #1a2236;
  --bg-kfx:   #10121E;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --border-kfx: rgba(16,185,129,0.18);
  --text:     #e8eaf0;
  --text2:    #8892a4;
  --text3:    #4a5568;
  --accent:   #3b82f6;
  --accent2:  #1d4ed8;
  --gold:     #f59e0b;
  --green:    #10b981;
  --red:      #ef4444;
  --purple:   #8b5cf6;
  --teal:     #14b8a6;
  --font:     'Noto Sans JP', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
body{min-height:100vh;padding-bottom:80px}

/* ── Header ── */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,14,26,0.93);backdrop-filter:blur(12px);
  border-bottom:0.5px solid var(--border2);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.h-title{font-size:13px;font-weight:500;letter-spacing:.08em;color:var(--text2);text-transform:uppercase}
.h-date{font-size:11px;color:var(--text3);margin-top:2px}
.upd-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);border:0.5px solid var(--border);border-radius:20px;padding:3px 8px}
.upd-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Week banner ── */
/* ── Week selector（1段構成） ── */
.week-sel{
  display:flex;align-items:center;gap:8px;
  padding:14px 16px;
  border-bottom:0.5px solid var(--border);
  background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);
}
.w-arrow{background:transparent;border:0.5px solid var(--border2);color:var(--text2);border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .15s;flex-shrink:0}
.w-arrow:hover{background:var(--bg3);color:var(--text)}
.w-arrow:disabled{opacity:.3;cursor:default}
.w-jump{background:transparent;border:0.5px solid var(--border2);color:var(--text2);border-radius:6px;height:32px;padding:0 8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-family:var(--font);transition:all .15s;flex-shrink:0;white-space:nowrap}
.w-jump:hover{background:rgba(59,130,246,.15);color:var(--accent);border-color:var(--accent)}
.w-label{flex:1;text-align:center}
.w-range-text{font-size:18px;font-weight:500;color:var(--text);display:block}
.w-now{font-size:10px;background:rgba(59,130,246,.15);color:var(--accent);padding:1px 6px;border-radius:3px;margin-left:6px}

/* ── Filters ── */
.filters{padding:10px 16px;display:flex;gap:8px;overflow-x:auto;border-bottom:0.5px solid var(--border);scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.f-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .15s}
.f-btn.active{background:var(--accent2);border-color:var(--accent);color:#fff}

/* ── Day block ── */
.day-block{border-bottom:0.5px solid var(--border)}
.day-hd{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-left:3px solid transparent}
.day-hd.today{border-left-color:var(--accent)}
.day-name{font-size:12px;font-weight:500;color:var(--text)}
.day-now{font-size:9px;color:var(--accent);margin-left:6px}
.day-cnt{font-size:10px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:10px}

/* ── Row base（左右padding共通 16px）── */
.row-base{padding:10px 16px;border-bottom:0.5px solid var(--border);display:grid;gap:0 8px;align-items:start}

/* みんかぶ行: 時間44px | 国旗20px | 本文 */
.row-mb{grid-template-columns:44px 20px 1fr}
.row-mb:hover{background:rgba(255,255,255,.02)}
.row-mb.high{border-left:2px solid var(--gold);padding-left:14px}

/* 羊飼い行 */
.row-kfx{
  grid-template-columns:44px 20px 1fr;
  background:var(--bg-kfx);
  border-bottom:0.5px solid rgba(255,255,255,0.05);
}
.row-kfx:hover{background:#14162a}

/* 共通セル */
.c-time{font-size:11px;color:#7a8fa8;font-weight:500;text-align:center;padding-top:2px}
.c-flag{font-size:14px;line-height:1.6;text-align:center}
.c-body{}
.c-name{font-size:11px;color:var(--text);line-height:1.5}
.c-meta{display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap}
.c-vals{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap}
.v{font-size:10px;color:var(--text3)}
.v span{color:var(--text2);margin-left:2px}

/* 羊飼い専用（文字色はみんかぶと統一） */
.kfx-vals{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap}

/* rank & stars */
.stars{font-size:11px;letter-spacing:-1px}
.son{color:var(--gold)}.sof{color:var(--border2)}
.rank{font-size:10px;font-weight:500;padding:0 3px;border-radius:3px}
.rank-S{color:var(--red);background:rgba(239,68,68,.1)}
.rank-A{color:var(--gold);background:rgba(245,158,11,.1)}
.rank-B,.rank-○{color:var(--green);background:rgba(16,185,129,.1)}
.rank-C,.rank-△{color:var(--text2);background:rgba(255,255,255,.05)}
.rank-D,.rank-✕{color:var(--text3);background:transparent}
.pips{font-size:10px}
.pp{color:var(--green)}.pn{color:var(--red)}.pz{color:var(--text3)}

/* ── Bottom nav ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,26,.95);backdrop-filter:blur(12px);border-top:0.5px solid var(--border2);display:flex;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.nb{flex:1;display:flex;align-items:center;justify-content:center;padding:4px;background:transparent;border:none;cursor:pointer;color:var(--text3);font-family:var(--font);transition:color .15s}
.nb.active{color:var(--accent)}
.nb-icon{font-size:20px;line-height:1}

/* loading / error */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px;color:var(--text3);font-size:12px}
.spin{width:24px;height:24px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{margin:16px;padding:16px;border:0.5px solid rgba(239,68,68,.3);border-radius:8px;background:rgba(239,68,68,.05);text-align:center;font-size:12px;color:var(--red)}
.retry{margin-top:10px;padding:6px 16px;background:transparent;border:0.5px solid var(--red);border-radius:4px;color:var(--red);font-size:11px;cursor:pointer;font-family:var(--font)}
.nodata{padding:16px;text-align:center;font-size:11px;color:var(--text3)}

@media(min-width:600px){body{max-width:480px;margin:0 auto}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="h-title">FX Dashboard</div>
    <div class="h-date" id="hDate"></div>
  </div>
  <div class="upd-badge"><span class="upd-dot"></span><span id="updTime">読込中...</span></div>
</div>

<div class="week-sel">
  <button class="w-arrow" id="btnPrev" onclick="changeWeek(-1)">‹</button>
  <div class="w-label">
    <span class="w-range-text" id="wSelText">—</span>
    <span class="w-now" id="wNow">今週</span>
  </div>
  <button class="w-arrow" id="btnNext" onclick="changeWeek(1)" disabled>›</button>
  <button class="w-jump" id="btnJump" onclick="jumpToLatest()" title="今週へジャンプ">&gt;&gt;</button>
</div>

<div class="filters">
  <button class="f-btn active" onclick="setFilter('all',this)">すべて</button>
  <button class="f-btn" onclick="setFilter('high',this)">★★★のみ</button>
  <button class="f-btn" onclick="setFilter('us',this)">🇺🇸 米国</button>
  <button class="f-btn" onclick="setFilter('jp',this)">🇯🇵 日本</button>
  <button class="f-btn" onclick="setFilter('gb',this)">🇬🇧 英国</button>
  <button class="f-btn" onclick="setFilter('cn',this)">🇨🇳 中国</button>
  <button class="f-btn" onclick="setFilter('eu',this)">🇪🇺 欧州</button>
</div>

<div id="main"><div class="loading"><div class="spin"></div>データを読み込み中...</div></div>

<nav class="bnav">
  <button class="nb active" onclick="showTab('calendar')"><span class="nb-icon">📅</span></button>
  <button class="nb" onclick="showTab('sources')"><span class="nb-icon">🔗</span></button>
</nav>

<script>
let ALLDATA=null, currentFilter='all', currentTab='calendar', weekIndex=0;

const CTRY={us:['米','アメリカ'],jp:['日','日本'],gb:['英','英国'],cn:['中','中国'],eu:['欧','ユーロ','独','仏']};

async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error();
    ALLDATA=await r.json();
    // 最新週（末尾）を初期表示
    weekIndex=(ALLDATA.weeks||[]).length-1;
    if(weekIndex<0) weekIndex=0;
    renderAll();
  }catch(e){
    document.getElementById('main').innerHTML=
      `<div class="err">データを読み込めませんでした<br>
       <small style="color:var(--text3);margin-top:4px;display:block">自動更新は毎朝6時に実行されます</small>
       <button class="retry" onclick="loadData()">再試行</button></div>`;
  }
}

function currentWeek(){
  if(!ALLDATA||!ALLDATA.weeks) return null;
  return ALLDATA.weeks[weekIndex]||null;
}

function renderAll(){
  if(!ALLDATA) return;
  const wk=currentWeek();
  if(!wk) return;
  const total=ALLDATA.weeks.length;
  document.getElementById('wSelText').textContent=wk.week_range||'—';
  document.getElementById('updTime').textContent=ALLDATA.updated_at?ALLDATA.updated_at.slice(5,16).replace('T',' ')+' 更新':'—';
  const n=new Date();
  document.getElementById('hDate').textContent=
    n.getFullYear()+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+String(n.getDate()).padStart(2,'0')+'('+'日月火水木金土'[n.getDay()]+')';
  // 今週バッジ：最後のweekのみ表示
  document.getElementById('wNow').style.display=weekIndex===total-1?'':'none';
  document.getElementById('btnPrev').disabled=weekIndex<=0;
  document.getElementById('btnNext').disabled=weekIndex>=total-1;
  document.getElementById('btnJump').disabled=weekIndex>=total-1;
  if(currentTab==='calendar') renderCalendar();
  else renderSources();
}

function changeWeek(d){
  const total=(ALLDATA&&ALLDATA.weeks)?ALLDATA.weeks.length:1;
  weekIndex=Math.max(0,Math.min(total-1,weekIndex+d));
  renderAll();
}

function jumpToLatest(){
  const total=(ALLDATA&&ALLDATA.weeks)?ALLDATA.weeks.length:1;
  weekIndex=total-1;
  renderAll();
}

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(currentTab==='calendar') renderCalendar();
}

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('active',['calendar','sources'][i]===tab));
  renderAll();
}

function matchFilter(name){
  if(currentFilter==='all'||currentFilter==='high') return true;
  return (CTRY[currentFilter]||[]).some(k=>name.includes(k));
}

function stars(n){
  let s='';
  for(let i=1;i<=3;i++) s+=`<span class="${i<=Math.min(n,3)?'son':'sof'}">★</span>`;
  return `<span class="stars">${s}</span>`;
}

function pipsHtml(v){
  if(!v||v==='---') return '';
  const n=parseFloat(v);
  if(isNaN(n)) return '';
  return `<span class="pips ${n>0?'pp':n<0?'pn':'pz'}">${n>0?'+':''}${v}pips</span>`;
}

function rankHtml(r){
  if(!r) return '';
  const cls=r==='S'?'rank-S':r==='A'?'rank-A':r==='B'||r==='○'?'rank-B':r==='C'||r==='△'?'rank-C':'rank-D';
  return `<span class="rank ${cls}">${r}</span>`;
}

function flagFor(name){
  const m=[[['米','アメリカ'],'🇺🇸'],[['英','英国'],'🇬🇧'],[['中','中国'],'🇨🇳'],
    [['日','日本'],'🇯🇵'],[['欧','ユーロ'],'🇪🇺'],[['豪'],'🇦🇺'],[['加','カナダ'],'🇨🇦'],
    [['独'],'🇩🇪'],[['仏'],'🇫🇷'],[['NZ'],'🇳🇿']];
  for(const[k,f]of m) if(k.some(x=>name.includes(x))) return f;
  return '🌐';
}

function timeToNum(t){
  if(!t||t==='-'||t==='引後') return 9999;
  const m=t.replace('翌','').match(/^(\d+):(\d+)/);
  const base=m?parseInt(m[1])*100+parseInt(m[2]):9999;
  return t.startsWith('翌')?base+3000:base;
}

function renderCalendar(){
  const wk=currentWeek();
  if(!wk||!wk.days) return;
  const todayNum=new Date().getDate();
  let html='';

  for(const day of wk.days){
    let mbRows=(day.minkabu||[]).filter(r=>{
      if(currentFilter==='high'&&r.importance<3) return false;
      if(!matchFilter(r.name)) return false;
      return true;
    }).map(r=>({...r,_src:'mb'}));

    let kfxRows=currentFilter==='all'
      ?(day.kissfx||[]).map(r=>({...r,_src:'kfx'}))
      :(day.kissfx||[]).filter(r=>matchFilter(r.name)).map(r=>({...r,_src:'kfx'}));

    if(!mbRows.length&&!kfxRows.length) continue;

    const merged=[...mbRows,...kfxRows].sort((a,b)=>timeToNum(a.time)-timeToNum(b.time));
    const totalCount=mbRows.length+kfxRows.length;

    const dayNum=parseInt((day.date.match(/(\d+)日/)||[])[1]||0);
    const isToday=dayNum===todayNum;

    html+=`<div class="day-block">
      <div class="day-hd ${isToday?'today':''}">
        <div class="day-name">${day.date}${isToday?'<span class="day-now">▶ 本日</span>':''}</div>
        <div class="day-cnt">${totalCount}件</div>
      </div>`;

    for(const item of merged){
      if(item._src==='mb'){
        // ── みんかぶ行 ──
        html+=`<div class="row-base row-mb ${item.importance>=3?'high':''}">
          <div class="c-time">${item.time||'—'}</div>
          <div class="c-flag">${flagFor(item.name)}</div>
          <div class="c-body">
            <div class="c-name">${item.name}</div>
            <div class="c-meta">
              ${stars(item.importance||0)}
              ${pipsHtml(item.pips)}
            </div>
            <div class="c-vals">
              <span class="v">前回<span>${item.prev||'—'}</span></span>
              <span class="v">予想<span>${item.forecast||'—'}</span></span>
              <span class="v">結果<span style="color:${item.result&&item.result!=='---'?'var(--green)':'var(--text3)'}">${item.result||'—'}</span></span>
            </div>
          </div>
        </div>`;
      } else {
        // ── 羊飼い行 ──
        html+=`<div class="row-base row-kfx">
          <div class="c-time">${item.time||'—'}</div>
          <div class="c-flag">${item.flag||flagFor(item.name)}</div>
          <div class="c-body">
            <div class="c-name">${item.name}</div>
            <div class="c-meta">
              ${rankHtml(item.rank)}
            </div>
            <div class="kfx-vals">
              <span class="v">市場<span>${item.forecast||'—'}</span></span>
              <span class="v">前回<span>${item.prev||'—'}</span></span>
            </div>
          </div>
        </div>`;
      }
    }
    html+=`</div>`;
  }

  document.getElementById('main').innerHTML=html||'<div class="nodata" style="padding:32px">条件に一致する指標がありません</div>';
}

function renderSources(){
  document.getElementById('main').innerHTML=`
    <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
      <a href="https://fx.minkabu.jp/indicators" target="_blank"
         style="display:block;padding:14px 16px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;text-decoration:none">
        <div style="font-size:9px;padding:1px 6px;border-radius:3px;background:rgba(59,130,246,.15);color:#60a5fa;display:inline-block">みんかぶFX</div>
        <div style="font-size:13px;color:var(--text);margin-top:6px">経済指標カレンダー</div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px">fx.minkabu.jp/indicators</div>
      </a>
      <a href="https://kissfx.com/" target="_blank"
         style="display:block;padding:14px 16px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;text-decoration:none">
        <div style="font-size:9px;padding:1px 6px;border-radius:3px;background:rgba(20,184,166,.15);color:#2dd4bf;display:inline-block">羊飼いFXブログ</div>
        <div style="font-size:13px;color:var(--text);margin-top:6px">今日の注目材料と指標ランク</div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px">kissfx.com</div>
      </a>
      <div style="padding:12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:8px">
        <div style="font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">データ情報</div>
        <div style="font-size:11px;color:var(--text2);line-height:2">
          更新タイミング：毎朝 6:00 (JST)<br>
          更新方式：GitHub Actions 自動実行<br>
          ホスティング：GitHub Pages<br>
          最終更新：${ALLDATA&&ALLDATA.updated_at?ALLDATA.updated_at.slice(0,16).replace('T',' '):'—'}
        </div>
      </div>
    </div>`;
}

loadData();
</script>
</body>
</html>
