name: FX Data Auto Update

on:
  schedule:
    # 平日（月〜金）JST 6:00〜23:55 を5分ごと（UTC -9h）
    - cron: '*/5 21-23 * * 0'   # 日曜 6:00〜8:55 JST
    - cron: '*/5 0-14 * * 1'    # 月曜 9:00〜23:55 JST
    - cron: '*/5 21-23 * * 1'   # 月曜 6:00〜8:55 JST
    - cron: '*/5 0-14 * * 2'    # 火曜 9:00〜23:55 JST
    - cron: '*/5 21-23 * * 2'   # 火曜 6:00〜8:55 JST
    - cron: '*/5 0-14 * * 3'    # 水曜 9:00〜23:55 JST
    - cron: '*/5 21-23 * * 3'   # 水曜 6:00〜8:55 JST
    - cron: '*/5 0-14 * * 4'    # 木曜 9:00〜23:55 JST
    - cron: '*/5 21-23 * * 4'   # 木曜 6:00〜8:55 JST
    - cron: '*/5 0-14 * * 5'    # 金曜 9:00〜23:55 JST
    - cron: '*/5 21-23 * * 5'   # 金曜 6:00〜8:55 JST
    - cron: '*/5 0-14 * * 6'    # 土曜 9:00〜23:55 JST
  workflow_dispatch:             # 手動実行ボタン

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "auto: FXデータ更新 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
          git push
