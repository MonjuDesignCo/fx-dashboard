name: FX Data Auto Update

on:
  schedule:
    - cron: '0 21 * * 0'   # 日曜 6:00 JST (UTC+9)
    - cron: '0 21 * * 1'   # 月曜 6:00 JST
    - cron: '0 21 * * 2'   # 火曜 6:00 JST
    - cron: '0 21 * * 3'   # 水曜 6:00 JST
    - cron: '0 21 * * 4'   # 木曜 6:00 JST
    - cron: '0 21 * * 5'   # 金曜 6:00 JST
    - cron: '0 21 * * 6'   # 土曜 6:00 JST
  workflow_dispatch:        # 手動実行ボタン

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "auto: FXデータ更新 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
          git push
